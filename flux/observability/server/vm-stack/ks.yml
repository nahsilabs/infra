apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-vm-stack
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-vm-operator
    - name: infra-gateway-api-crds
  path: ./flux/observability/server/vm-stack/app
  targetNamespace: obs-stack
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-vm-mcp
  namespace: flux-system
spec:
  dependsOn:
    - name: obs-vm-stack
    - name: infra-gateway-api-crds
    - name: infra-agenticgateway
  path: ./flux/observability/server/vm-stack/mcp
  targetNamespace: obs-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
