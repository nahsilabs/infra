apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-mcp
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-logs-mcp
      version: 0.1.0
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    fullnameOverride: victoria-logs-mcp
    mcp:
      mode: http
    vl:
      entrypoint: http://vlsingle-stack.obs-stack.svc:9428
