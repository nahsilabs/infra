apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-mcp
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana-mcp
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agenticgateway
            gateway.networking.k8s.io/gateway-name: agenticgateway-internal
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
