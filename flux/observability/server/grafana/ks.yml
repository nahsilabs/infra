apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-grafana-deps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-cloudnative-pg
  path: ./flux/observability/server/grafana/deps
  targetNamespace: obs-stack
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-grafana
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-grafana-operator
    - name: obs-vm-stack
    - name: infra-gateway-api-crds
    - name: obs-grafana-deps
  path: ./flux/observability/server/grafana/app
  targetNamespace: obs-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-grafana-mcp
  namespace: flux-system
spec:
  dependsOn:
    - name: obs-grafana
    - name: infra-gateway-api-crds
    - name: infra-agenticgateway
  path: ./flux/observability/server/grafana/mcp
  targetNamespace: obs-stack
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
