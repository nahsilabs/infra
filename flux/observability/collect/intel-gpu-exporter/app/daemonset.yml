apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: intel-gpu-exporter
  labels:
    app.kubernetes.io/name: intel-gpu-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: intel-gpu-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intel-gpu-exporter
    spec:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      containers:
        - name: all-smi
          image: docker.io/nahsilabs/all-smi:latest@sha256:b958e97f1fb5c5bb1affbf73a9fe5545ea17786cfa74ab39cc13842d50db9398
          args: ["api", "--port", "9090"]
          env:
            - name: ZES_ENABLE_SYSMAN
              value: "1"
          ports:
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
              gpu.intel.com/monitoring: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["PERFMON"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: udev
              mountPath: /run/udev
              readOnly: true
      volumes:
        - name: udev
          hostPath:
            path: /run/udev
            type: Directory
