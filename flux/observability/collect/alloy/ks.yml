apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-alloy
  namespace: flux-system
spec:
  path: ./flux/observability/collect/alloy/app
  targetNamespace: observability
  prune: true
  dependsOn:
    - name: infra-gateway-api-crds
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
