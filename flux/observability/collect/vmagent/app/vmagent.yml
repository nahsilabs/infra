apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: stack
spec:
  selectAllByDefault: false
  serviceScrapeSelector:
    matchLabels:
      obs.nahsilabs/metrics: "true"
  serviceScrapeNamespaceSelector: {}
  nodeScrapeSelector:
    matchLabels:
      obs.nahsilabs/metrics: "true"
  replicaCount: 1
  scrapeInterval: 30s
  externalLabels:
    cluster: nahsilabs
  remoteWrite:
    - url: http://vmsingle-stack.obs-stack.svc:8429/api/v1/write
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      memory: 256Mi
