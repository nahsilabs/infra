apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-state-metrics
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kube-state-metrics
    namespace: flux-system
  values:
    image:
      registry: registry.k8s.io
      repository: kube-state-metrics/kube-state-metrics
      tag: v2.19.0@sha256:6b2f0b6f2f86ac5b1aa883a033a8dd55bb96c16d191ec973393bdaadaddac914
    fullnameOverride: kube-state-metrics

    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          scrape: "true"
