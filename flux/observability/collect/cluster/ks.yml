apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-cluster
  namespace: flux-system
spec:
  path: ./flux/observability/collect/cluster/app
  targetNamespace: obs-collect
  prune: true
  dependsOn:
    - name: infra-vm-operator
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
