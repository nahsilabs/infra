apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-node-exporter
  namespace: flux-system
spec:
  path: ./flux/observability/collect/node-exporter/app
  targetNamespace: observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
