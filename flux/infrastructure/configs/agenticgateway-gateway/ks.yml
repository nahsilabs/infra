apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-agenticgateway-config
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  targetNamespace: agenticgateway
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/configs/agenticgateway-gateway/app
  dependsOn:
    - name: infra-cert-manager
    - name: infra-agenticgateway-crds
    - name: infra-agenticgateway
    - name: infra-prometheus-operator-crds
