apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway-cert
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: false
  wait: true
  targetNamespace: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/configs/gateways/app
  dependsOn:
    - name: infra-cert-manager
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway-private
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  targetNamespace: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/configs/gateways/app/private
  dependsOn:
    - name: infra-gateway-cert
    - name: infra-gateway-api-crds
    - name: infra-envoy-gateway
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-gateway-public
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  targetNamespace: envoy-gateway
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/configs/gateways/app/public
  dependsOn:
    - name: infra-gateway-cert
    - name: infra-gateway-api-crds
    - name: infra-envoy-gateway
