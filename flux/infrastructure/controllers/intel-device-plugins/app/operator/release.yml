apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: intel-device-plugins-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: intel-device-plugins-operator
      version: 0.36.0
      interval: 30m
      sourceRef:
        kind: HelmRepository
        name: intel
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    manager:
      image:
        hub: docker.io/intel
        tag: 0.32.0@sha256:9be71af95085a0b821ea4d542265c28011debbc8963b0a1f38041afed67956ef
    controllerExtraArgs: |
      - --devices=gpu
