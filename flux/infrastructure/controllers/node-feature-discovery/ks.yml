apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-node-feature-discovery
  namespace: flux-system
spec:
  interval: 1h
  timeout: 15m
  retryInterval: 2m
  prune: true
  wait: true
  targetNamespace: node-feature-discovery
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/controllers/node-feature-discovery/app
