apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  chart:
    spec:
      chart: external-secrets
      version: 2.7.0
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    image:
      repository: ghcr.io/external-secrets/external-secrets
      tag: v2.6.0@sha256:b8ffd3cf43132989711bcbdd8c364d6fd3af2d77b113bef0acb25d4bb8657a95
    crds:
      create: true
