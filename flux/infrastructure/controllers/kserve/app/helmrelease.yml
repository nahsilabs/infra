apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve-llmisvc-resources
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kserve-llmisvc-resources
    namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    kserve:
      controller:
        deploymentMode: Standard
      llmisvc:
        createGIECRDs: true
      storage:
        resources:
          limits:
            memory: 4Gi
