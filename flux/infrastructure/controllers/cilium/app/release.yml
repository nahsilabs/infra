apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  values:
    # Run everywhere operationally needed, but respect the nahsilabs/offline
    # taint: by NOT tolerating it, cilium is evicted from offline nodes (e.g.
    # pergamon) and they drop out of the DaemonSet's desired count, so the
    # rollout can reach all-ready instead of waiting forever on a dead node.
    tolerations: &cilium-tolerations
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
      - key: node.cilium.io/agent-not-ready
        operator: Exists
      - key: node.kubernetes.io/not-ready
        operator: Exists
      - key: node.kubernetes.io/unreachable
        operator: Exists
      - key: node.kubernetes.io/unschedulable
        operator: Exists
      - key: node.kubernetes.io/network-unavailable
        operator: Exists
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
      - key: node.kubernetes.io/memory-pressure
        operator: Exists
      - key: node.kubernetes.io/pid-pressure
        operator: Exists

    envoy:
      rollOutPods: true
      tolerations: *cilium-tolerations

    operator:
      rollOutPods: true

    rollOutCiliumPods: true

    ipam:
      mode: kubernetes

    k8sServiceHost: localhost
    k8sServicePort: 7445

    kubeProxyReplacement: true

    bpf:
      masquerade: true

    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
          - PERFMON
          - BPF
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF

    cgroup:
      autoMount:
        enabled: false
      hostRoot: /sys/fs/cgroup

    bgpControlPlane:
      enabled: true

    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enableOpenMetrics: true
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"
