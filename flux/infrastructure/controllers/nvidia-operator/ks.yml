apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-nvidia-operator
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 15m
  prune: true
  wait: true
  dependsOn:
    - name: infra-prometheus-operator-crds
  targetNamespace: gpu-operator
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/controllers/nvidia-operator/app
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: obs-nvidia-dashboard
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-grafana-operator
    - name: obs-grafana
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: true
  targetNamespace: obs-collect
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/controllers/nvidia-operator/obs
