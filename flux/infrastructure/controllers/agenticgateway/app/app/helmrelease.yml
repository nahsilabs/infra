apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agenticgateway
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: agenticgateway
    namespace: flux-system
  values:
    inferenceExtension:
      enabled: true
    monitoring:
      enabled: true
      serviceMonitor:
        extraLabels:
          obs.nahsilabs/metrics: "true"
