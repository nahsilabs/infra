apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agenticgateway
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: agenticgateway
    namespace: flux-system
  values:
    proxy:
      image:
        registry: docker.io
        repository: nahsilabs/agentgateway
        tag: v1.3.1-pr2016-dcr
    inferenceExtension:
      enabled: true
    monitoring:
      enabled: true
      serviceMonitor:
        extraLabels:
          obs.nahsilabs/metrics: "true"
