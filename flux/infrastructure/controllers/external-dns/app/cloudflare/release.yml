apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 1.15.2
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.15.1@sha256:4f3ba4c2bd28030caad05bb7b47fbf47549a46d5e8443b74f0be463550b4fc2b
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare
            key: CF_API_TOKEN
    sources:
      - gateway-httproute
    policy: sync
    txtOwnerId: nahsilabs
    domainFilters:
      - "nahsi.dev"
    provider: cloudflare
    extraArgs:
      - --target-net-filter=37.98.199.176/29
    serviceMonitor:
      enabled: true
      additionalLabels:
        scrape: "true"
