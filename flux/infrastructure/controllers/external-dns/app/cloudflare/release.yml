apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: registry.k8s.io/external-dns/external-dns
      tag: v0.21.0@sha256:f53faaf71cb270d1ca9dce6ea0c94bfebf1a18696263487f0fbc74b9bf2bd7ff
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: external-dns-cloudflare
            key: CF_API_TOKEN
    sources:
      - gateway-httproute
    policy: sync
    txtOwnerId: nahsilabs
    domainFilters:
      - "nahsi.dev"
    provider: cloudflare
    extraArgs:
      - --target-net-filter=37.98.199.176/29
    serviceMonitor:
      enabled: true
      additionalLabels:
        scrape: "true"
