apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-external-dns
  namespace: flux-system
spec:
  interval: 1h
  timeout: 15m
  retryInterval: 2m
  prune: true
  wait: true
  targetNamespace: external-dns
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/infrastructure/controllers/external-dns/app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
