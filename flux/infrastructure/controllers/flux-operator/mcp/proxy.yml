apiVersion: apps/v1
kind: Deployment
metadata:
  name: flux-mcp-oauth-proxy
  labels:
    app.kubernetes.io/name: flux-mcp-oauth-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flux-mcp-oauth-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flux-mcp-oauth-proxy
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: proxy
          image: ghcr.io/allardy/mcp-oauth-proxy:0.3.3@sha256:54f1b63d76cdd3e3cd2a8783113dc47ddebd6d2b81ecd607798d018de31aaebd
          envFrom:
            - secretRef:
                name: flux-mcp-oauth-proxy
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: flux-mcp-oauth-proxy
  labels:
    app.kubernetes.io/name: flux-mcp-oauth-proxy
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
  selector:
    app.kubernetes.io/name: flux-mcp-oauth-proxy
