apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  releaseName: envoy-gateway
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system
  install:
    createNamespace: true
    crds: Skip
  upgrade:
    crds: Skip
  values:
    deployment:
      replicas: 1
      envoyGateway:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
    config:
      envoyGateway:
        logging:
          level:
            default: info
        provider:
          type: Kubernetes
          kubernetes:
            envoyService:
              type: LoadBalancer
              externalTrafficPolicy: Local
              allocateLoadBalancerNodePorts: true
              labels:
                cilium-bgp-private: "true"
