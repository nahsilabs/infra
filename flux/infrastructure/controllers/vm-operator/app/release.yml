apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm-operator
spec:
  interval: 1h
  chart:
    spec:
      chart: victoria-metrics-operator
      version: 0.66.3
      sourceRef:
        kind: HelmRepository
        name: victoriametrics
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      strategy: rollback
      retries: 3
  values:
    image:
      repository: victoriametrics/operator
      tag: v0.72.0@sha256:5137b8ddeed33429845595394d1537b53ff8b054d92578cfb4e999554d310e93
    env:
    fullnameOverride: vm-operator
    operator:
      disable_prometheus_converter: false
      enable_converter_ownership: true
    admissionWebhooks:
      enabled: true
      certManager:
        enabled: true
    serviceMonitor:
      enabled: true
