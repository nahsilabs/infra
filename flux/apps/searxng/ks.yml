---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-searxng-deps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  wait: true
  targetNamespace: searxng
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/apps/searxng/deps
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-searxng
  namespace: flux-system
spec:
  dependsOn:
    - name: app-searxng-deps
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  prune: true
  targetNamespace: searxng
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/apps/searxng/app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
