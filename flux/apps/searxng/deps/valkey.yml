apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng-valkey
spec:
  interval: 1h
  chart:
    spec:
      chart: valkey
      version: 0.11.0
      sourceRef:
        kind: HelmRepository
        name: valkey
        namespace: flux-system
  values:
    image:
      tag: "9.0.2@sha256:930b41430fb727f533c5982fe509b6f04233e26d0f7354e04de4b0d5c706e44e"
    fullnameOverride: searxng-valkey

    dataStorage:
      enabled: false

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
