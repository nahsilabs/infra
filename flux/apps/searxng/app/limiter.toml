[botdetection]
ipv4_prefix = 32
ipv6_prefix = 48

# Trust the envoy gateway to pass real client IPs
trusted_proxies = [
  '127.0.0.0/8',
  '::1',
  '10.244.0.0/16',
]

[botdetection.ip_limit]
filter_link_local = true
link_token = true

[botdetection.ip_lists]
block_ip = []
pass_ip = []
pass_searxng_org = false
