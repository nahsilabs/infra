apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: readeck
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        containers:
          main:
            image:
              repository: codeberg.org/readeck/readeck
              tag: 0.22.3@sha256:ed1c513f8e1d59b1d38fda324ac279eeb65afd0327907e498061ec9fd2f31c15
            env:
              READECK_LOG_LEVEL: info
              READECK_SERVER_HOST: 0.0.0.0
              READECK_USE_X_FORWARDED: "true"
              READECK_ALLOWED_HOSTS: readeck.nahsi.dev
              # CNPG emits a postgresql:// uri, but Readeck's driver only knows
              # postgres:// — rebuild the DSN from the secret's parts (the
              # CNPG-generated password is URL-safe). $(VAR) expands at pod
              # start; app-template renders env keys sorted, so DB_* precede
              # READECK_DATABASE_SOURCE.
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: pg-readeck-app
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: pg-readeck-app
                    key: port
              DB_USER:
                valueFrom:
                  secretKeyRef:
                    name: pg-readeck-app
                    key: user
              DB_PASS:
                valueFrom:
                  secretKeyRef:
                    name: pg-readeck-app
                    key: password
              DB_NAME:
                valueFrom:
                  secretKeyRef:
                    name: pg-readeck-app
                    key: dbname
              READECK_DATABASE_SOURCE: "postgres://$(DB_USER):$(DB_PASS)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"

    service:
      main:
        controller: main
        ports:
          http:
            port: 8000

    persistence:
      data:
        existingClaim: readeck-data
        globalMounts:
          - path: /readeck

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Readeck
          gethomepage.dev/icon: readeck.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=readeck"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - readeck.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
