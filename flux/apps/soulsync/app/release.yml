apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: soulsync
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/nezreka/soulsync
              tag: latest
            env:
              TZ: Europe/Athens
              PUID: "65534"
              PGID: "65534"
              PYTHONPATH: /app
              SOULSYNC_CONFIG_PATH: /app/data/config/config.json
              DATABASE_PATH: /app/data/db/music_library.db

    defaultPodOptions:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8008

    persistence:
      data:
        existingClaim: soulsync-data
        globalMounts:
          - path: /app/data
      downloads:
        existingClaim: soulsync-downloads
        globalMounts:
          - path: /app/downloads
      staging:
        existingClaim: soulsync-staging
        globalMounts:
          - path: /app/Staging
      transfer:
        existingClaim: soulsync-transfer
        globalMounts:
          - path: /app/Transfer

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: soulsync
          gethomepage.dev/icon: soulsync
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=soulsync"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - soulsync.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
