---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: soulsync-downloads
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-soulsync-downloads
  mountOptions:
    - nconnect=8
    - hard
    - noatime
  nfs:
    server: nfs.lan
    path: /mnt/storage/downloads/slskd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: soulsync-downloads
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-soulsync-downloads
  volumeName: soulsync-downloads
  resources:
    requests:
      storage: 1Gi
