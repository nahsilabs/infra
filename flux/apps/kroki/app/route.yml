apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kroki
spec:
  parentRefs:
    - name: private-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - kroki.nahsi.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kroki
          port: 8000
          weight: 1
