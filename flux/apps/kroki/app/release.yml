apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kroki
spec:
  interval: 1h
  chart:
    spec:
      chart: kroki
      version: 6.1.0
      sourceRef:
        kind: HelmRepository
        name: cowboysysop
        namespace: flux-system

  values:
    image:
      registry: docker.io
      repository: yuzutech/kroki
      # renovate: datasource=github-releases depName=yuzutech/kroki
      tag: 0.31.0@sha256:c16303ecd8ae840a6e3a76efa53468836c6297eeb7b7316845c3b24e8dbd0398

    ingress:
      enabled: false

    resources:
      limits:
        cpu: 1000m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

    diagramsnet:
      enabled: true
      image:
        registry: docker.io
        repository: yuzutech/kroki-diagramsnet
        # renovate: datasource=github-releases depName=yuzutech/kroki
        tag: 0.31.0@sha256:b04d5af8fe119b666ec6c6cb7bfa31ec5f71aaad8b729caec0723c3b9e480c32

    excalidraw:
      enabled: true
      image:
        registry: docker.io
        repository: yuzutech/kroki-excalidraw
        # renovate: datasource=github-releases depName=yuzutech/kroki
        tag: 0.31.0@sha256:fb35dc7a0dbe95b5398d5e39b0e9e35be350b4a7d5859d59c1bccfbc73f80e9c

    mermaid:
      enabled: true
      image:
        registry: docker.io
        repository: yuzutech/kroki-mermaid
        # renovate: datasource=github-releases depName=yuzutech/kroki
        tag: 0.31.0@sha256:26fb7f5e67a0e6005a3fdc9407dc81e1a6f9ce50972de6d193a1bb4b0d72e5d0
