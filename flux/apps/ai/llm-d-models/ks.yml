apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-llm-d-models
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  targetNamespace: ai
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/apps/ai/llm-d-models/models
  dependsOn:
    - name: app-llm-d-infra
