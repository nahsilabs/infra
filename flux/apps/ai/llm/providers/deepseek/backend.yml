apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: deepseek
spec:
  ai:
    groups:
      - providers:
          - name: deepseek
            openai:
              model: deepseek-v4-pro
            host: api.deepseek.com
            port: 443
            pathPrefix: /v1
            policies:
              auth:
                secretRef:
                  name: deepseek
              tls:
                sni: api.deepseek.com
