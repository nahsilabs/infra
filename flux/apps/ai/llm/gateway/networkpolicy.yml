apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: llm-workload-lockdown
  namespace: ai
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/part-of: llminferenceservice
      kserve.io/component: workload
  ingress:
    - fromEntities:
        - host
        - remote-node
        - health
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agenticgateway
            gateway.networking.k8s.io/gateway-name: agenticgateway-internal
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: ai
            app.kubernetes.io/part-of: llminferenceservice
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: obs-collect
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
