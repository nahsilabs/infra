apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-model-costs
  namespace: agenticgateway
data:
  # USD per 1,000,000 tokens. Keyed by gen_ai_system (protocol) + the RESOLVED upstream model id
  # (agentgateway's cost lookup uses response.provider_model, not the requested/alias name).
  # Rates verified against deepinfra.com model pages. Local Qwen omitted (self-hosted, no per-token cost).
  catalog.json: |
    {
      "providers": {
        "openai": {
          "models": {
            "openai/gpt-oss-20b": { "rates": { "input": "0.03", "output": "0.14" } },
            "deepseek-ai/DeepSeek-V4-Flash": { "rates": { "input": "0.10", "output": "0.20", "cacheRead": "0.02" } }
          }
        }
      }
    }
