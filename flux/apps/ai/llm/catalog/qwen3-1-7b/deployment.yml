apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-1-7b
  labels:
    app.kubernetes.io/name: qwen3-1-7b
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen3-1-7b
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen3-1-7b
    spec:
      nodeSelector:
        kubernetes.io/hostname: heliopolis
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server-b9853
          args:
            - -hf
            - unsloth/Qwen3-1.7B-GGUF:Q8_0
            - -a
            - Qwen/Qwen3-1.7B
            - -c
            - "16384"
            - -t
            - "8"
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --jinja
            - --reasoning-budget
            - "0"
            - --metrics
          env:
            - name: HOME
              value: /models
            - name: LLAMA_CACHE
              value: /models
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "2"
              memory: 2Gi
            limits:
              cpu: "8"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-1-7b
  labels:
    app.kubernetes.io/name: qwen3-1-7b
    app.kubernetes.io/part-of: llama-cpp
spec:
  selector:
    app.kubernetes.io/name: qwen3-1-7b
  ports:
    - name: http
      port: 8080
      targetPort: http
