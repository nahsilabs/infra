apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen3-6-27b
spec:
  model:
    uri: hf://webhie/Qwen3.6-27B-int4-AutoRound-Code
    name: Qwen/Qwen3.6-27B
  template:
    securityContext:
      fsGroup: 1000
    containers:
      - name: main
        env:
          - name: PYTORCH_CUDA_ALLOC_CONF
            value: expandable_segments:True
          - name: VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS
            value: "0"
        args:
          - --kv-cache-dtype
          - turboquant_k8v4
          - --max-model-len
          - "110592"
          - --gpu-memory-utilization
          - "0.98"
          - --max-num-seqs
          - "2"
          - --max-num-batched-tokens
          - "2560"
          - --enable-prefix-caching
          - --enable-chunked-prefill
          - --enable-auto-tool-choice
          - --tool-call-parser
          - qwen3_coder
          - --reasoning-parser
          - qwen3
          - --generation-config
          - vllm
          - --trust-remote-code
        resources:
          limits:
            cpu: "8"
            memory: 24Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "4"
            memory: 21Gi
            nvidia.com/gpu: "1"
    volumes:
      - name: kserve-provision-location
        persistentVolumeClaim:
          claimName: qwen3-6-27b
  router:
    scheduler: {}
