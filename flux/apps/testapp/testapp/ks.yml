apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: testapp
  namespace: flux-system
spec:
  path: ./flux/apps/testapp/testapp/app
  prune: false
  targetNamespace: testapp
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
