apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stirling-pdf
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/stirling-tools/s-pdf
              tag: 2.13.2@sha256:976dfa581b6cb1fb91e9b0b90284a92febe8ba6a4519e28f95c4e8e550d6d70d
            env:
              TZ: Europe/Athens
              SECURITY_ENABLELOGIN: "false"
              DISABLE_ADDITIONAL_FEATURES: "true"
              SYSTEM_ENABLEANALYTICS: "false"
              ALLOW_GOOGLE_VISIBILITY: "false"
              SYSTEM_GOOGLEVISIBILITY: "false"
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/v1/info/status
              readiness:
                enabled: true
                type: HTTP
                path: /api/v1/info/status
              startup:
                enabled: true
                type: HTTP
                path: /api/v1/info/status
                spec:
                  failureThreshold: 90
                  periodSeconds: 5

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        existingClaim: stirling-pdf-config
        globalMounts:
          - path: /configs
      logs:
        type: emptyDir
        globalMounts:
          - path: /logs
      customfiles:
        type: emptyDir
        globalMounts:
          - path: /customFiles
      pipeline:
        type: emptyDir
        globalMounts:
          - path: /pipeline
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      tessdata:
        type: emptyDir
        globalMounts:
          - path: /usr/share/tessdata

    route:
      private:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Stirling PDF
          gethomepage.dev/description: PDF Viewer and Editor
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: stirling-pdf.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=stirling-pdf"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - pdf.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
