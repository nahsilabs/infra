apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: recommendarr
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: docker.io/tannermiddleton/recommendarr
              tag: v1.4.4@sha256:c946dd24542ab3cf6b0d56ab1d69e1ea1ff1d84f8a293ceeeaf3f53f09e50db6
            env:
              PUBLIC_URL: https://recommendarr.nahsi.dev
              DOCKER_ENV: true
              PORT: 3000
              FORCE_SECURE_COOKIES: true

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000

    persistence:
      data:
        existingClaim: recommendarr-config
        globalMounts:
          - path: /app/server/data

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Arr"
          gethomepage.dev/name: Recommendarr
          gethomepage.dev/icon: requestrr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=recommendarr"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - recommendarr.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
