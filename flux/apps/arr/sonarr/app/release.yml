apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/sonarr
              tag: 4.0.17.2967
            env:
              TZ: Europe/Athens
              SONARR__INSTANCE_NAME: Sonarr
              SONARR__PORT: 8989
              SONARR__APPLICATION_URL: https://sonarr.nahsi.dev
              SONARR__LOG_LEVEL: info

    defaultPodOptions:
      securityContext:
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534

    service:
      main:
        controller: main
        ports:
          http:
            port: 8989

    persistence:
      config:
        existingClaim: sonarr-config
        globalMounts:
          - path: /config
      data:
        existingClaim: sonarr-video
        globalMounts:
          - path: /data

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Arr"
          gethomepage.dev/name: Sonarr
          gethomepage.dev/icon: sonarr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=sonarr"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - sonarr.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
