---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ceph-rbd-retain
  volumeName: pvc-6ea09c7b-8d62-4c22-a54f-216aa14c6ef9
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-radarr-video
  annotations:
    pv.kubernetes.io/provisioned-by: nfs.csi.k8s.io
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - nconnect=8
    - noatime
    - soft
    - softerr
    - timeo=50
    - retrans=3
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: nfs.lan#mnt/storage/media/video#radarr
    volumeAttributes:
      server: nfs.lan
      share: /mnt/storage/media/video
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-video
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  volumeName: nfs-radarr-video
  resources:
    requests:
      storage: 1Gi
