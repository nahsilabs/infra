apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: soularr
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: mrusse08/soularr
              tag: v1.2.2@sha256:c4f97924fabfce4e0de539d821ea7d20519b95c4815a707bacfc9d7212597f20
            env:
              TZ: Europe/Athens
              PUID: "65534"
              PGID: "65534"
              SCRIPT_INTERVAL: "300"

    defaultPodOptions:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8265

    persistence:
      data:
        existingClaim: soularr-data
        globalMounts:
          - path: /data
      downloads:
        existingClaim: soularr-downloads
        globalMounts:
          - path: /downloads

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Arr"
          gethomepage.dev/name: Soularr
          gethomepage.dev/icon: lidarr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=soularr"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - soularr.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            timeouts:
              request: 0s
            backendRefs:
              - identifier: main
                port: http
                weight: 1
