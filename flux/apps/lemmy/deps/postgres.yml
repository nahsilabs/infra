apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lemmy
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:7a9a68272eb5f192c5826fdd72b1ebc81c185fea21678993c5583610c7e59739
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  managed:
    roles:
      - name: app
        superuser: true
        login: true
  storage:
    size: 5Gi
    storageClass: ceph-rbd-retain
