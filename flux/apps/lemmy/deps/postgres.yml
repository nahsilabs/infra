apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lemmy
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:1a8ef3dc0dc214c1764660291b29a98288b13753c09e9981b86eaf0c75de8bdc
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  managed:
    roles:
      - name: app
        superuser: true
        login: true
  storage:
    size: 5Gi
    storageClass: ceph-rbd-retain
