apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-lemmy
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:afbcd2ca3827991317113ba8a90348f321b13a9698c39aaac8c089837a4e07f3
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: true
  managed:
    roles:
      - name: app
        superuser: true
        login: true
  storage:
    size: 5Gi
    storageClass: ceph-rbd-retain
