apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: networking
spec:
  interval: 30m
  releaseName: envoy-gateway
  chart:
    spec:
      chart: envoy-gateway
      version: "v1.0.0"
      sourceRef:
        kind: HelmRepository
        name: envoy-gateway
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    controller:
      image:
        repository: ghcr.io/envoyproxy/gateway
      deployment:
        replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    gateway:
      image:
        repository: ghcr.io/envoyproxy/gateway
      deployment:
        replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
        ports:
          - name: http
            port: 80
            protocol: TCP
            targetPort: 8080
          - name: https
            port: 443
            protocol: TCP
            targetPort: 8443
    env:
      LOG_LEVEL: info
