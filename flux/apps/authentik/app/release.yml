apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: 2026.5.4
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    global:
      env:
        - name: AUTHENTIK_POSTGRESQL__HOST
          valueFrom:
            secretKeyRef:
              name: pg-authentik-app
              key: host
        - name: AUTHENTIK_POSTGRESQL__NAME
          valueFrom:
            secretKeyRef:
              name: pg-authentik-app
              key: dbname
        - name: AUTHENTIK_POSTGRESQL__USER
          valueFrom:
            secretKeyRef:
              name: pg-authentik-app
              key: username
        - name: AUTHENTIK_POSTGRESQL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: pg-authentik-app
              key: password
      envFrom:
        - secretRef:
            name: authentik-secret
        - secretRef:
            name: authentik-smtp
      volumes:
        - name: public
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: public
          mountPath: /media/public

    authentik:
      log_level: info
      error_reporting:
        enabled: false

    postgresql:
      enabled: false

    server:
      containerSecurityContext:
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
      resources:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          memory: 1Gi
      route:
        main:
          enabled: true
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: "Infra"
            gethomepage.dev/name: Authentik
            gethomepage.dev/icon: authentik.png
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=authentik"
          parentRefs:
            - name: private-gateway
              namespace: envoy-gateway
              sectionName: https
          hostnames:
            - auth.nahsi.dev

    worker:
      containerSecurityContext:
        readOnlyRootFilesystem: true
      volumeMounts:
        - name: tmp
          mountPath: /tmp
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi
