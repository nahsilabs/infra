apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
spec:
  interval: 1h
  chart:
    spec:
      chart: immich
      version: 0.12.0
      sourceRef:
        kind: HelmRepository
        name: immich-charts
        namespace: flux-system
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Deployment
              name: immich-server
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
          - target:
              version: v1
              kind: Deployment
              name: immich-machine-learning
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/immich-app/immich-server
              tag: "v2.7.5@sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5"
            env:
              TZ: Europe/Athens
              REDIS_HOSTNAME: "immich-valkey"
              IMMICH_MACHINE_LEARNING_URL: "http://immich-machine-learning:3003"
              DB_HOSTNAME:
                valueFrom:
                  secretKeyRef:
                    name: pg-immich-superuser
                    key: host
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: pg-immich-superuser
                    key: port
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: pg-immich-superuser
                    key: username
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: pg-immich-superuser
                    key: password
              DB_DATABASE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: pg-immich-app
                    key: dbname
    
    valkey:
      enabled: true
      persistence:
        data:
          existingClaim: immich-valkey
    
    immich:
      metrics:
        enabled: true
      persistence:
        library:
          existingClaim: immich-photos
    
    server:
      resources:
        requests:
          cpu: 500m
          memory: 1024M
          gpu.intel.com/i915: 1
        limits:
          cpu: 1500m
          memory: 3096M
          gpu.intel.com/i915: 1
      ingress:
        public:
          enabled: false
        private:
          enabled: false
    
    machine-learning:
      controllers:
        main:
          containers:
            main:
              image:
                repository: ghcr.io/immich-app/immich-machine-learning
                tag: "v2.7.5-openvino@sha256:71cd5a681823c4b818f4b24b3f05816eccc3d085559e7615f695bde77e64f1f2"
      env:
        MACHINE_LEARNING_CACHE_FOLDER: /cache
        MACHINE_LEARNING_PRELOAD__CLIP__VISUAL: ViT-B-32__openai
        MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__RECOGNITION: buffalo_l
        MACHINE_LEARNING_PRELOAD__FACIAL_RECOGNITION__DETECTION: buffalo_l
      resources:
        requests:
          cpu: 100m
          memory: 4096M
          gpu.intel.com/i915: 1
        limits:
          cpu: 500m
          memory: 5120M
          gpu.intel.com/i915: 1
      persistence:
        cache:
          existingClaim: immich-ml-cache
      probes:
        liveness:
          spec:
            initialDelaySeconds: 300
        readiness:
          spec:
            initialDelaySeconds: 300
