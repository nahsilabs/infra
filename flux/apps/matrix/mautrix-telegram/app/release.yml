apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mautrix-telegram
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: dock.mau.dev/mautrix/telegram
              tag: v0.2605.0

            command: [/usr/bin/mautrix-telegram]
            args:
              - -c
              - /data/config.yaml
              - -n

            env:
              MAUTRIX_TELEGRAM_APPSERVICE__AS_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-secret
                    key: as_token
              MAUTRIX_TELEGRAM_APPSERVICE__HS_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-secret
                    key: hs_token
              MAUTRIX_TELEGRAM_NETWORK__API_ID:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-secret
                    key: api_id
              MAUTRIX_TELEGRAM_NETWORK__API_HASH:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-secret
                    key: api_hash
              MAUTRIX_TELEGRAM_ENCRYPTION__PICKLE_KEY:
                valueFrom:
                  secretKeyRef:
                    name: mautrix-telegram-secret
                    key: pickle_key
              MAUTRIX_TELEGRAM_DATABASE__URI:
                valueFrom:
                  secretKeyRef:
                    name: pg-mautrix-telegram-app
                    key: uri

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1337
        runAsGroup: 1337
        fsGroup: 1337
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        publishNotReadyAddresses: true
        ports:
          http:
            port: 29317

    persistence:
      config:
        type: configMap
        name: mautrix-telegram-config
        globalMounts:
          - path: /data/config.yaml
            subPath: config.yaml
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
