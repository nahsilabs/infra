apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mas
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/element-hq/matrix-authentication-service
              tag: 1.21.0@sha256:73bb86fb8f412082829e603417b2df3e351bbda79bedaa46beb0f3f533bdcc1c

            env:
              MAS_CONFIG: /config/config.yaml

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &healthPort 8081
                  periodSeconds: 10
                  timeoutSeconds: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *healthPort
                  failureThreshold: 30
                  periodSeconds: 10

            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 500Mi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        type: secret
        name: mas-secret
        globalMounts:
          - path: /config/config.yaml
            subPath: config.yaml
            readOnly: true

    route:
      main:
        parentRefs:
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - mas.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http

      compat:
        parentRefs:
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - matrix.nahsi.dev
        rules:
          - matches:
              - path:
                  type: RegularExpression
                  value: "^/_matrix/client/.*/(?:login|logout|refresh).*"
            backendRefs:
              - identifier: main
                port: http
