apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-ketesa
  namespace: flux-system
spec:
  dependsOn:
    - name: app-synapse
  path: ./flux/apps/matrix/ketesa/app
  targetNamespace: matrix
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
