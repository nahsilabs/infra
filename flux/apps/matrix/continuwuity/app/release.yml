apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: continuwuity
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: forgejo.ellis.link/continuwuation/continuwuity
              tag: v0.5.9-maxperf@sha256:674f59c5c6c72a7ca08f01f09143761b0111127752a0f69607e3bed8ca9b4216

            env:
              CONTINUWUITY_SERVER_NAME: "nahsi.dev"
              CONTINUWUITY_ADDRESS: "0.0.0.0"
              CONTINUWUITY_PORT: &port 8080
              CONTINUWUITY_DATABASE_PATH: "/data"
              CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""
              CONTINUWUITY_ALLOW_REGISTRATION: false
              CONTINUWUITY_SUSPEND_ON_REGISTER: false
              CONTINUWUITY_WELL_KNOWN__CLIENT: "https://matrix.nahsi.dev"
              CONTINUWUITY_WELL_KNOWN__SERVER: "matrix.nahsi.dev:443"
              CONTINUWUITY_ALLOW_FEDERATION: true
              CONTINUWUITY_ALLOW_ENCRYPTION: true
              CONTINUWUITY_REQUIRE_AUTH_FOR_PROFILE_REQUESTS: true
              CONTINUWUITY_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: true
              CONTINUWUITY_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: false
              CONTINUWUITY_ALLOW_DEVICE_NAME_FEDERATION: false
              CONTINUWUITY_ALLOW_LEGACY_MEDIA: true
              CONTINUWUITY_ALLOW_OUTGOING_PRESENCE: true
              CONTINUWUITY_FORGET_FORCED_UPON_LEAVE: true
              CONTINUWUITY_IP_LOOKUP_STRATEGY: "1"
              CONTINUWUITY_QUERY_OVER_TCP_ONLY: true
              CONTINUWUITY_ZSTD_COMPRESSION: true
              CONTINUWUITY_ALLOW_ANNOUNCEMENTS_CHECK: false

            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/federation/v1/version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /_matrix/federation/v1/version
                    port: *port
                  periodSeconds: 5
                  failureThreshold: 30

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: *port

    persistence:
      data:
        existingClaim: continuwuity-data
        globalMounts:
          - path: /data
      media:
        existingClaim: continuwuity-media
        globalMounts:
          - path: /data/media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      public:
        parentRefs:
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - matrix.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http

      private:
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - matrix.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http

      well-known:
        parentRefs:
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https-apex
        hostnames:
          - nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix/
            backendRefs:
              - identifier: main
                port: http
