apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: element-web
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system

  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/element-hq/element-web
              tag: v1.12.24@sha256:9f9b546280e67e492d56f6e775c449e74356bffb98daaf211abc755276713fad

            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    persistence:
      config:
        type: configMap
        name: element-web-config
        globalMounts:
          - path: /app/config.json
            subPath: config.json
            readOnly: true

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Matrix"
          gethomepage.dev/name: "Element"
          gethomepage.dev/icon: "element"
        parentRefs:
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - element.nahsi.dev
        rules:
          - backendRefs:
              - identifier: main
                port: http
