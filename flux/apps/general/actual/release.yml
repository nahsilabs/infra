apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actualbudget
spec:
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 10m0s
  timeout: 10m0s
  values:
    controllers:
      actual:
        type: deployment
        strategy: Recreate
        containers:
          actual:
            image:
              repository: ghcr.io/actualbudget/actual-server
              tag: 26.1.0
    service:
      actual:
        controller: actual
        ports:
          http:
            port: &port 5006

    ingress:
      public:
        annotations:
          cert-manager.io/cluster-issuer: nahsi.dev
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Actual
          gethomepage.dev/icon: actualbudget.png
        enabled: true
        className: "nginx-public"
        hosts:
          - host: &host actual.nahsi.dev
            paths:
            - path: /
              pathType: Prefix
              service:
                identifier: actual
                port: *port

        tls:
          - hosts:
              - *host
            secretName: actual-tls

      private:
        annotations:
          cert-manager.io/cluster-issuer: nahsi.dev
        className: "nginx-private"
        hosts:
          - host: *host
            paths:
              - path: /
                service:
                  identifier: actual
                  port: *port

        tls:
          - hosts:
              - *host
            secretName: actual-tls

    persistence:
      config:
        existingClaim: actualbudget-data
        advancedMounts:
          actual:
            app:
              - path: /data
