apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vikunja
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: vikunja/vikunja
              tag: 2.2.0@sha256:fefda8ba71c3b06cc7f53f93ee14ebf1ad155a535e572b8dc702a46d789fc6d1
            env:
              VIKUNJA_SERVICE_PUBLICURL: https://vikunja.nahsi.dev
              VIKUNJA_SERVICE_TIMEZONE: "Europe/Athens"
              VIKUNJA_SERVICE_ENABLELINKSHARING: "false"
              VIKUNJA_SERVICE_ENABLEREGISTRATION: "false"
              VIKUNJA_SERVICE_ENABLETASKCOMMENTS: "false"
              VIKUNJA_DEFAULTSETTINGS_WEEK_START: 1
              VIKUNJA_SERVICE_JWT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: vikunja-secret
                    key: jwt
              VIKUNJA_DATABASE_TYPE: "postgres"
              VIKUNJA_DATABASE_HOST:
                valueFrom:
                  secretKeyRef:
                    name: pg-vikunja-app
                    key: host
              VIKUNJA_DATABASE_PORT:
                valueFrom:
                  secretKeyRef:
                    name: pg-vikunja-app
                    key: port
              VIKUNJA_DATABASE_USER:
                valueFrom:
                  secretKeyRef:
                    name: pg-vikunja-app
                    key: username
              VIKUNJA_DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: pg-vikunja-app
                    key: password
              VIKUNJA_DATABASE_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: pg-vikunja-app
                    key: dbname

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi

        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: Always
            seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: 3456

    persistence:
      files:
        existingClaim: "vikunja-data"
        advancedMounts:
          main:
            main:
              - path: /app/vikunja/files
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      private:
        enabled: true
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Vikunja
          gethomepage.dev/icon: vikunja.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=vikunja"
        parentRefs:
          - name: private-gateway
            namespace: networking
            sectionName: https
        hostnames:
          - vikunja.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1

      public:
        parentRefs:
          - name: public-gateway
            namespace: networking
            sectionName: https
        hostnames:
          - vikunja.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1

