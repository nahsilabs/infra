apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app stirling-pdf
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      app:
        containers:
          app:
            image:
              repository: ghcr.io/stirling-tools/s-pdf
              tag: 2.10.0@sha256:4d9abedcd57a9aa4d36ffb8fc9a4801aea2d295bf6ad349e23dd4b45661a5e42
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Athens
              SECURITY_ENABLELOGIN: "false"
              DISABLE_ADDITIONAL_FEATURES: "true"
              SYSTEM_ENABLEANALYTICS: "false"
              ALLOW_GOOGLE_VISIBILITY: "false"
              SYSTEM_GOOGLEVISIBILITY: "false"
            probes:
              liveness: &probe
                enabled: true
                type: HTTP
                path: /api/v1/info/status
              readiness: *probe
              startup:
                <<: *probe
                spec:
                  failureThreshold: 90
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 600Mi

    service:
      app:
        controller: app
        type: ClusterIP
        ports:
          http:
            port: 8080

    route:
      private:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Stirling PDF
          gethomepage.dev/description: PDF Viewer and Editor
          gethomepage.dev/group: Apps
          gethomepage.dev/icon: stirling-pdf.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=stirling-pdf"
        parentRefs:
          - name: private-gateway
            namespace: networking
            sectionName: https
        hostnames:
          - pdf.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: app
                port: 8080
                weight: 1

    persistence:
      config:
        existingClaim: stirling-pdf-config
        globalMounts:
          - path: /configs
      logs:
        type: emptyDir
        globalMounts:
          - path: /logs
      customfiles:
        type: emptyDir
        globalMounts:
          - path: /customFiles
      pipeline:
        type: emptyDir
        globalMounts:
          - path: /pipeline
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      tessdata:
        type: emptyDir
        globalMounts:
          - path: /usr/share/tessdata
