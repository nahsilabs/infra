apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memos
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/usememos/memos
              tag: 0.27.1@sha256:71048ab89888696e7f37956920c712d2f70fae9c180d4086cd1e3ae3da06a6cb
            env:
              MEMOS_DRIVER: postgres
              MEMOS_DSN:
                valueFrom:
                  secretKeyRef:
                    name: pg-memos-app
                    key: uri
              MEMOS_PUBLIC: "false"
              MEMOS_PASSWORD_AUTH: "false"
              MEMOS_INSTANCE_URL: "https://memos.nahsi.dev"

    service:
      main:
        controller: main
        ports:
          http:
            port: 5230

    route:
      private:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Memos
          gethomepage.dev/icon: memos.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=memos"
        parentRefs:
          - name: private-gateway
            namespace: networking
            sectionName: https
        hostnames:
          - memos.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: main
                port: 5230
                weight: 1

      public:
        parentRefs:
          - name: public-gateway
            namespace: networking
            sectionName: https
        hostnames:
          - memos.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - kind: Service
                name: main
                port: 5230
                weight: 1
