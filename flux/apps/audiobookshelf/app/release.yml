apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.35.0@sha256:89276ff2e0b3d2f07dd334b641f27a34ab7f02e1047c60b7b8a30126cb0813a5
            env:
              TZ: Europe/Athens
              PORT: 8080
              CONFIG_PATH: /config
              METADATA_PATH: /config/metadata

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        existingClaim: audiobookshelf-config
        globalMounts:
          - path: /config
      audiobooks:
        existingClaim: audiobookshelf-audiobooks
        globalMounts:
          - path: /audiobooks
      podcasts:
        existingClaim: audiobookshelf-podcasts
        globalMounts:
          - path: /podcasts

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Media"
          gethomepage.dev/name: Audiobookshelf
          gethomepage.dev/icon: audiobookshelf.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=audiobookshelf"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - audio.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
