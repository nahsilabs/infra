apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  interval: 1h
  chart:
    spec:
      chart: vaultwarden
      version: "0.43.1"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
      interval: 1h
  values:
    image:
      registry: docker.io
      repository: vaultwarden/server
      tag: 1.36.0-alpine@sha256:d3531610b486905943706b235e97159331801c6856e1367a93a5905e2b40f204
    resourceType: StatefulSet
    domain: "https://secrets.nahsi.dev"
    logging:
      logLevel: debug
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      additionalAnnotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: "Apps"
        gethomepage.dev/name: Vaultwarden
        gethomepage.dev/icon: vaultwarden.png
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=vaultwarden"
      parentRefs:
        - name: private-gateway
          namespace: envoy-gateway
          sectionName: https
        - name: public-gateway
          namespace: envoy-gateway
          sectionName: https
      hostnames:
        - secrets.nahsi.dev
      path: /
    adminToken:
      existingSecret: vaultwarden-secret
      existingSecretKey: token
    storage:
      data:
        name: vaultwarden-data
        class: ceph-rbd
        accessMode: ReadWriteOnce
        size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    database:
      type: postgresql
      existingSecret: pg-vaultwarden-app
      existingSecretKey: uri
