apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vaultwarden
spec:
  interval: 1h
  chart:
    spec:
      chart: vaultwarden
      version: "0.36.2"
      sourceRef:
        kind: HelmRepository
        name: vaultwarden
        namespace: flux-system
      interval: 1h
  values:
    image:
      registry: docker.io
      repository: vaultwarden/server
      tag: 1.35.7-alpine@sha256:9a54dad95452412afb959664dc5d6c3c3ca7c4131116ca7667888b0376320b03
    resourceType: StatefulSet
    domain: "https://secrets.nahsi.dev"
    logging:
      logLevel: debug
    ingress:
      enabled: false
    adminToken:
      existingSecret: vaultwarden-secret
      existingSecretKey: token
    storage:
      data:
        name: vaultwarden-data
        class: ceph-rbd
        accessMode: ReadWriteOnce
        size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    database:
      type: postgresql
      existingSecret: pg-vaultwarden-app
      existingSecretKey: uri
