apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qui
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.21.0@sha256:79c1b800297c985cbeb7fb3215cbb00b32a22cb6a39b7e356eb8bb75d872c924
            env:
              TZ: Europe/Athens
              QBT_HOST: http://qbittorrent.downloads.svc.cluster.local:8080

    service:
      main:
        controller: main
        ports:
          http:
            port: 7476

    persistence:
      config:
        existingClaim: qui-config
        globalMounts:
          - path: /config

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: qui
          gethomepage.dev/icon: autobrr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=qui"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - qui.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
