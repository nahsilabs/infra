apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qui
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/autobrr/qui
              tag: v1.19.0@sha256:baa07db5326f75f8c2246703603cbe2132476c8ad0ab31c976a960cb4c4731f5
            env:
              TZ: Europe/Athens
              QBT_HOST: http://qbittorrent.downloads.svc.cluster.local:8080

    service:
      main:
        controller: main
        ports:
          http:
            port: 7476

    persistence:
      config:
        existingClaim: qui-config
        globalMounts:
          - path: /config

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: qui
          gethomepage.dev/icon: autobrr.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=qui"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - qui.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
