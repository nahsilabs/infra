apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-slskd
  namespace: flux-system
spec:
  path: ./flux/apps/downloads/slskd/app
  targetNamespace: downloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
