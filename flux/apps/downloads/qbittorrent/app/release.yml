apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        strategy: Recreate
        initContainers:
          lockfile:
            image:
              repository: busybox
              tag: 1.38.0@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
            command: ["/bin/sh", "-c", "rm -f /config/qBittorrent/lockfile"]
        containers:
          main:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
            env:
              TZ: Europe/Athens
              QBITTORRENT__PORT: "8080"
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
              runAsNonRoot: true

          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              TZ: Europe/Athens
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              FIREWALL_VPN_INPUT_PORTS: "40020"
              FIREWALL_INPUT_PORTS: "8080"
              DOT: "off"
            envFrom:
              - secretRef:
                  name: qbittorrent-gluetun
            securityContext:
              capabilities:
                add: [NET_ADMIN]
            lifecycle:
              postStart:
                exec:
                  command: ["/bin/sh", "-c", "(ip rule del table 51828; ip -6 rule del table 51828) || true"]

    defaultPodOptions:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        existingClaim: qbittorrent-config
        globalMounts:
          - path: /config
      incomplete:
        existingClaim: qbittorrent-incomplete
        globalMounts:
          - path: /mnt/incomplete
      downloads:
        existingClaim: qbittorrent-downloads
        globalMounts:
          - path: /mnt/downloads
      video:
        existingClaim: qbittorrent-video
        globalMounts:
          - path: /mnt/video

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: qBittorrent
          gethomepage.dev/icon: qbittorrent.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=qbittorrent"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - qbittorrent.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
