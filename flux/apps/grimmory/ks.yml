---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-grimmory-deps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-mariadb-operator
  path: ./flux/apps/grimmory/deps
  targetNamespace: grimmory
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-grimmory
  namespace: flux-system
spec:
  dependsOn:
    - name: app-grimmory-deps
  path: ./flux/apps/grimmory/app
  targetNamespace: grimmory
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
