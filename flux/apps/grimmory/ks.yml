apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: grimmory
  namespace: flux-system
spec:
  dependsOn:
    - name: gateway-private
    - name: gateway-public
    - name: mariadb-operator
  path: ./flux/apps/grimmory/app
  prune: true
  targetNamespace: grimmory
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
