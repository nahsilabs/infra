apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: grimmory-mariadb
spec:
  rootPasswordSecretKeyRef:
    name: grimmory-mariadb-root
    key: password
    generate: true
  database: grimmory
  username: grimmory
  passwordSecretKeyRef:
    name: grimmory-mariadb-user
    key: password
    generate: true
  storage:
    size: 1Gi
    storageClassName: ceph-rbd-retain
  replicas: 1
