---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-actual
  namespace: flux-system
spec:
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  wait: true
  targetNamespace: actual
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/apps/actual/app
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-actual-mcp
  namespace: flux-system
spec:
  dependsOn:
    - name: app-actual
  interval: 1h
  timeout: 5m
  retryInterval: 2m
  prune: true
  targetNamespace: actual
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  path: ./flux/apps/actual/mcp
  decryption:
    provider: sops
    secretRef:
      name: sops-age
