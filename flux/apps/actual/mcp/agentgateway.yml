apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: actual-mcp
spec:
  mcp:
    sessionRouting: Stateful
    targets:
      - name: actual
        static:
          host: actual-mcp.actual.svc.cluster.local
          port: 3600
          path: /http
          protocol: StreamableHTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-mcp
spec:
  parentRefs:
    - name: agenticgateway-internal
      namespace: agenticgateway
      sectionName: https
  hostnames:
    - ai.nahsi.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp/actual
        - path:
            type: PathPrefix
            value: /.well-known/oauth-protected-resource/mcp/actual
      backendRefs:
        - group: agentgateway.dev
          kind: AgentgatewayBackend
          name: actual-mcp
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: actual-mcp
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: actual-mcp
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
        - issuer: https://auth.nahsi.dev/application/o/actual-mcp/
          audiences:
            - https://ai.nahsi.dev/mcp/actual
            - "f3e5ffced99760e6"
          jwks:
            remote:
              backendRef:
                kind: Service
                name: authentik-server
                namespace: authentik
                port: 80
              jwksPath: /application/o/actual-mcp/jwks/
      mcp:
        resourceMetadata:
          resource: https://ai.nahsi.dev/mcp/actual
          scopesSupported:
            - openid
            - profile
            - email
            - offline_access
          bearerMethodsSupported:
            - header
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: actual-mcp-oidc-discovery
spec:
  parentRefs:
    - name: private-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - auth.nahsi.dev
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/openid-configuration/application/o/actual-mcp
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /application/o/actual-mcp/.well-known/openid-configuration
            statusCode: 302
