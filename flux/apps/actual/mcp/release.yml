apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual-mcp
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        replicas: 1
        containers:
          main:
            image:
              repository: ghcr.io/agigante80/actual-mcp-server
              tag: 0.8.10@sha256:8faeae3df15e2560978f4add5eb92cb3cb5bdd69672540569b2f666411f63da4
            env:
              ACTUAL_SERVER_URL: http://actualbudget.actual.svc.cluster.local:5006
              MCP_ALLOW_UNAUTHENTICATED: "true"
              MCP_BRIDGE_DATA_DIR: /app/data
              MCP_BRIDGE_PORT: "3600"
              MCP_HTTP_PATH: /http
              MCP_BRIDGE_HTTP_PATH: /mcp/actual
              MCP_BRIDGE_PUBLIC_HOST: ai.nahsi.dev
              MCP_BRIDGE_PUBLIC_SCHEME: https
              NODE_ENV: production
              LOG_FORMAT: json
              MCP_BRIDGE_LOG_LEVEL: info
            envFrom:
              - secretRef:
                  name: actual-mcp
            probes:
              liveness:
                type: HTTP
                path: /health
                port: 3600
              readiness:
                type: HTTP
                path: /health
                port: 3600
              startup:
                type: HTTP
                path: /health
                port: 3600
                spec:
                  initialDelaySeconds: 10
                  failureThreshold: 30
                  periodSeconds: 5

    service:
      main:
        controller: main
        ports:
          http:
            port: 3600

    persistence:
      data:
        existingClaim: actual-mcp-data
        globalMounts:
          - path: /app/data
