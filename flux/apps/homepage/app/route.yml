apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
spec:
  parentRefs:
    - name: private-gateway
      namespace: envoy-gateway
      sectionName: https
    - name: public-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - home.nahsi.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage
          port: 3000
          weight: 1
