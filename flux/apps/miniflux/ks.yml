apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: miniflux
  namespace: flux-system
spec:
  dependsOn:
    - name: gateway-private
    - name: gateway-public
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  path: ./flux/apps/miniflux/app
  prune: true
  targetNamespace: miniflux
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
