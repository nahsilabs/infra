apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: miniflux
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: miniflux/miniflux
              tag: 2.3.2@sha256:cd353a6af9ce663291f405eddef26fa0d567f486b521c5d34e3fb50e41938b9a
            env:
              LISTEN_ADDR: "0.0.0.0:8080"
              BASE_URL: "https://rss.nahsi.dev"
              HTTPS: "1"
              RUN_MIGRATIONS: "1"
              WORKER_POOL_SIZE: "4"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: pg-miniflux-app
                    key: uri

            envFrom:
              - secretRef:
                  name: miniflux-oidc

            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: Always
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Miniflux
          gethomepage.dev/icon: miniflux.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=miniflux"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - rss.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
