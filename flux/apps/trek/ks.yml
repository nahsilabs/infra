---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-trek
  namespace: flux-system
spec:
  path: ./flux/apps/trek/app
  targetNamespace: trek
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  dependsOn:
    - name: infra-gateway-api-crds
  decryption:
    provider: sops
    secretRef:
      name: sops-age
