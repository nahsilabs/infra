apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: trek
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: mauriceboe/trek
              tag: 3.4.1@sha256:ce7fab639b89a6f62d484d1175a7d489a536a8c77291f56c03fec20608d4a3eb
            envFrom:
              - secretRef:
                  name: trek-secret
            env:
              APP_URL: https://trek.nahsi.dev
              TRUST_PROXY: "1"
              FORCE_HTTPS: "true"
              TZ: Europe/Athens
            probes:
              liveness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000
              readiness:
                enabled: true
                type: HTTP
                path: /api/health
                port: 3000
    service:
      main:
        controller: main
        ports:
          http:
            port: 3000
    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: TREK
          gethomepage.dev/icon: https://raw.githubusercontent.com/mauriceboe/TREK/main/client/public/icons/icon.svg
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=trek"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - trek.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
    persistence:
      data:
        size: 1Gi
        storageClass: ceph-rbd-retain
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /app/data
      uploads:
        size: 10Gi
        storageClass: ceph-rbd-retain
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /app/uploads
