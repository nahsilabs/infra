apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gpu-operator
  namespace: nvidia
spec:
  interval: 30m
  chart:
    spec:
      chart: gpu-operator
      version: "v26.3.0"
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
  values:
    driver:
      enabled: false
    toolkit:
      enabled: false
    hostPaths:
      driverInstallDir: /usr/local/glibc/usr/lib

    sandboxWorkloads:
      enabled: true
      defaultWorkload: "container"

      runtimeClass: "nvidia"
      resources:
        requests:
          cpu: 200m
          memory: 100Mi
        limits:
          cpu: 500m
          memory: 350Mi

    validator:
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi

    daemonsets:
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

    devicePlugin:
      resources:
        requests:
          cpu: 100m
          memory: 30Mi
        limits:
          cpu: 300m
          memory: 39Mi
      config:
        create: true
        name: "nvidia-device-plugin-config"
        default: "default"
        data:
          default: |-
            version: v1
            flags:
              migStrategy: none
              plugin:
                nvidiaCTKPath: /usr/local/bin/nvidia-ctk

    migManager:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 50m
      #     memory: 64Mi
      #   limits:
      #     cpu: 200m
      #     memory: 128Mi

    mig:
      strategy: none

    nfd:
      enabled: false
    node-feature-discovery:
      enabled: false

    gfd:
      enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 40Mi
        limits:
          cpu: 200m
          memory: 52Mi

    vgpuDeviceManager:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 50m
      #     memory: 64Mi
      #   limits:
      #     cpu: 200m
      #     memory: 128Mi

    vfioManager:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 50m
      #     memory: 64Mi
      #   limits:
      #     cpu: 200m
      #     memory: 128Mi

    dcgmExporter:
      enabled: true
      resources:
        requests:
          cpu: 100m
          memory: 384Mi
        limits:
          cpu: 500m
          memory: 500Mi

    vgpuManager:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 100m
      #     memory: 128Mi
      #   limits:
      #     cpu: 300m
      #     memory: 256Mi

    sandboxDevicePlugin:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 50m
      #     memory: 64Mi
      #   limits:
      #     cpu: 200m
      #     memory: 128Mi

    kataManager:
      enabled: false
      # resources:
      #   requests:
      #     cpu: 100m
      #     memory: 128Mi
      #   limits:
      #     cpu: 300m
      #     memory: 256Mi
