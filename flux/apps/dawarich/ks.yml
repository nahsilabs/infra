---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-dawarich-deps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-cloudnative-pg
  path: ./flux/apps/dawarich/deps
  targetNamespace: dawarich
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-dawarich
  namespace: flux-system
spec:
  dependsOn:
    - name: app-dawarich-deps
    - name: infra-gateway-api-crds
    - name: infra-prometheus-operator-crds
  path: ./flux/apps/dawarich/app
  targetNamespace: dawarich
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
