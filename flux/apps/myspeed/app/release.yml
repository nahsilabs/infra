apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: myspeed
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: germannewsmaker/myspeed
              tag: 1.0.9@sha256:3a3e774b3f78d930a5a962d625b99bcb3d71730bfeb4a6b93e04fd38cfe7d9a9
            env:
              TZ: Europe/Athens
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true

    service:
      main:
        controller: main
        ports:
          http:
            port: 5216

    serviceMonitor:
      main:
        enabled: true
        labels:
          obs.nahsilabs/metrics: "true"
        endpoints:
          - port: http
            path: /api/prometheus/metrics
            interval: 30s
            relabelings:
              - action: replace
                regex: .*
                replacement: myspeed
                targetLabel: instance

    persistence:
      config:
        existingClaim: myspeed-config
        globalMounts:
          - path: /myspeed/data

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Observability"
          gethomepage.dev/name: MySpeed
          gethomepage.dev/icon: myspeed.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=myspeed"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - myspeed.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
