apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-myspeed
  namespace: flux-system
spec:
  path: ./flux/apps/myspeed/app
  targetNamespace: myspeed
  prune: true
  dependsOn:
    - name: infra-prometheus-operator-crds
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
