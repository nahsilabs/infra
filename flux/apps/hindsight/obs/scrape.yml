apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hindsight
  labels:
    obs.nahsilabs/metrics: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hindsight
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
