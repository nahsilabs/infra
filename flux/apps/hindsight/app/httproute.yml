apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Ai"
    gethomepage.dev/name: Hindsight
    gethomepage.dev/icon: hindsight.png
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=hindsight"
spec:
  parentRefs:
    - name: private-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - hindsight.nahsi.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hindsight-control-plane
          port: 3000
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
        - path:
            type: PathPrefix
            value: /v1
        - path:
            type: PathPrefix
            value: /docs
        - path:
            type: PathPrefix
            value: /redoc
        - path:
            type: PathPrefix
            value: /openapi.json
      timeouts:
        request: "300s"
        backendRequest: "300s"
      backendRefs:
        - name: hindsight-api
          port: 8888
          weight: 1
