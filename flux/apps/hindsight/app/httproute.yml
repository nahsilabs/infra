apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hindsight
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: "Ai"
    gethomepage.dev/name: Hindsight
    gethomepage.dev/icon: hindsight.png
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=hindsight"
spec:
  parentRefs:
    - name: private-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - hindsight.nahsi.dev
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: hindsight-control-plane
          port: 3000
          weight: 1
