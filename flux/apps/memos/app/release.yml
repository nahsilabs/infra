apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memos
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/usememos/memos
              tag: 0.29.1@sha256:3e1253477066eb2aefa91145f7f9038bb931ed88c8a3ee05310a933594cdba7d
            env:
              MEMOS_DRIVER: postgres
              MEMOS_DSN:
                valueFrom:
                  secretKeyRef:
                    name: pg-memos-app
                    key: uri
              MEMOS_PUBLIC: "false"
              MEMOS_PASSWORD_AUTH: "false"
              MEMOS_INSTANCE_URL: "https://memos.nahsi.dev"

    service:
      main:
        controller: main
        ports:
          http:
            port: 5230

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Apps"
          gethomepage.dev/name: Memos
          gethomepage.dev/icon: memos.png
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=memos"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
          - name: public-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - memos.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
