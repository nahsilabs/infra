apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy
spec:
  secretStoreRef:
    kind: SecretStore
    name: kubernetes
  target:
    name: ntfy-config
    template:
      engineVersion: v2
      data:
        server.yml: |
          base-url: https://ntfy.nahsi.dev
          listen-http: :8080
          behind-proxy: true
          keepalive-interval: 45s

          # iOS push support
          upstream-base-url: https://ntfy.sh

          # Database (PostgreSQL)
          database-url: "postgresql://app:{{ .pg_password }}@pg-ntfy-rw.ntfy.svc:5432/app?sslmode=disable"
          cache-duration: 12h

          # Auth
          auth-default-access: deny-all
          enable-login: true
          require-login: true
          enable-signup: false
          enable-reservations: false

          # Admin user
          auth-users:
            - "{{ .ADMIN_USER }}"

          # ACLs
          auth-access:
            - "*:up*:wo"

          # Attachments (S3)
          attachment-cache-dir: "s3://{{ .S3_ACCESS_KEY }}:{{ .S3_SECRET_KEY }}@ntfy?endpoint=https://s3.nahsi.dev:9000&region=us-east-1"
          attachment-file-size-limit: 50M
          attachment-total-size-limit: 5G
          attachment-expiry-duration: 24h

          # Rate limits - per visitor
          visitor-request-limit-burst: 60
          visitor-request-limit-replenish: 5s
          visitor-message-daily-limit: 500
          visitor-subscription-limit: 30
          visitor-topic-creation-limit-burst: 50
          visitor-topic-creation-limit-replenish: 1m
          visitor-attachment-total-size-limit: 100M
          visitor-attachment-daily-bandwidth-limit: 500M

          # Rate limits - global
          global-topic-limit: 1000

          # UnifiedPush
          visitor-subscriber-rate-limiting: true

          # Messages
          message-size-limit: 4K
          message-delay-limit: 3d

          # Logging
          log-format: json
          log-level: info
  data:
    - secretKey: pg_password
      remoteRef:
        key: pg-ntfy-app
        property: password
  dataFrom:
    - extract:
        key: ntfy-vars
      sourceRef:
        storeRef:
          kind: SecretStore
          name: kubernetes
