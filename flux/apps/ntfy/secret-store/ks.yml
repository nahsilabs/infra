apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-ntfy-secret-store
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-external-secrets
  path: ./flux/apps/ntfy/secret-store/app
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 10m
