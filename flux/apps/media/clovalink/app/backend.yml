apiVersion: apps/v1
kind: Deployment
metadata:
  name: clovalink-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/clovalink/clovalink-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: STORAGE_TYPE
              value: local

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pg-clovalink-app
                  key: uri

            - name: REDIS_URL
              value: redis://127.0.0.1:6379

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clovalink-backend-secret
                  key: JWT_SECRET

            - name: ENVIRONMENT
              value: production

            - name: CORS_DEV_MODE
              value: "false"

            - name: CORS_ALLOWED_ORIGINS
              value: https://clovalink.nahsi.dev

            - name: USE_PRESIGNED_URLS
              value: "false"

            - name: REPLICATION_ENABLED
              value: "false"

            - name: CLAMAV_ENABLED
              value: "false"

            - name: DB_MAX_CONNECTIONS
              value: "50"
            - name: DB_MIN_CONNECTIONS
              value: "10"
            - name: DB_ACQUIRE_TIMEOUT_SECS
              value: "5"
            - name: DB_IDLE_TIMEOUT_SECS
              value: "600"
            - name: DB_MAX_LIFETIME_SECS
              value: "1800"

            - name: MAX_CONCURRENT_REQUESTS
              value: "1000"
            - name: REQUEST_TIMEOUT_SECS
              value: "300"
            - name: PER_IP_REQUESTS_PER_SEC
              value: "100"
            - name: PER_IP_BURST_SIZE
              value: "200"
            - name: CIRCUIT_BREAKER_THRESHOLD
              value: "5"
            - name: CIRCUIT_BREAKER_RECOVERY_SECS
              value: "30"

            - name: TRANSFER_SMALL_CONCURRENT
              value: "50"
            - name: TRANSFER_MEDIUM_CONCURRENT
              value: "20"
            - name: TRANSFER_LARGE_CONCURRENT
              value: "5"
            - name: TRANSFER_LARGE_BANDWIDTH_MBPS
              value: "50"

            - name: EXTENSION_WEBHOOK_TIMEOUT_MS
              value: "5000"

            - name: RUST_LOG
              value: info

            - name: PORT
              value: "3000"

          volumeMounts:
            - name: data
              mountPath: /app/data

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --save
            - "60"
            - "1000"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clovalink-data
        - name: redis-data
          persistentVolumeClaim:
            claimName: clovalink-redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: clovathing-backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 3000
      targetPort: http
