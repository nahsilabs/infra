apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- pvc.yml
- secret.yml
- postgres.yml
- backend.yml
- frontend.yml
- ingress.yml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: clovalink
    app.kubernetes.io/part-of: clovalink

configMapGenerator:
  - name: clovalink-frontend-nginx
    files:
      - default.conf=nginx.conf
