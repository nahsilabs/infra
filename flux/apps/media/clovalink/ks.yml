apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clovalink
  namespace: flux-system
spec:
  path: ./flux/apps/media/clovalink/app
  prune: false
  targetNamespace: media
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
