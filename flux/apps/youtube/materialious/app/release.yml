apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: materialious
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: wardpearce/materialious
              tag: 1.16.28@sha256:8e0ed14be7f6b8964cbbe9350274c6770029dad653663a5b6434f528d60b94b8
            env:
              VITE_DEFAULT_INVIDIOUS_INSTANCE: "https://iv.nahsi.dev"
              VITE_DEFAULT_RETURNYTDISLIKES_INSTANCE: "https://returnyoutubedislikeapi.com"
              VITE_DEFAULT_SPONSERBLOCK_INSTANCE: "https://sponsor.ajay.app"
              VITE_DEFAULT_DEARROW_INSTANCE: "https://sponsor.ajay.app"
              VITE_DEFAULT_DEARROW_THUMBNAIL_INSTANCE: "https://dearrow-thumb.ajay.app"
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "NET_BIND_SERVICE", "SETUID", "SETGID"]

    defaultPodOptions:
      securityContext:
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: 80

    route:
      main:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: "Media"
          gethomepage.dev/name: YouTube
          gethomepage.dev/icon: invidious
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=materialious"
        parentRefs:
          - name: private-gateway
            namespace: envoy-gateway
            sectionName: https
        hostnames:
          - yt.nahsi.dev
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - identifier: main
                port: http
                weight: 1
