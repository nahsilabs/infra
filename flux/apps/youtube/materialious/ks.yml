apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-materialious
  namespace: flux-system
spec:
  dependsOn:
    - name: app-invidious
  path: ./flux/apps/youtube/materialious/app
  targetNamespace: youtube
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
