apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: companion
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 5.0.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  values:
    controllers:
      main:
        containers:
          main:
            image:
              repository: quay.io/invidious/invidious-companion
              tag: latest@sha256:c2bacd4b7e2d80d1ac474d3b287aafd03140c2b8618095dd7c9c0c8884c0b7fc
            env:
              SERVER_ENABLE_METRICS: "true"
              SERVER_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: companion-secret
                    key: COMPANION_KEY
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: Always
        seccompProfile: {type: RuntimeDefault}

    service:
      main:
        controller: main
        ports:
          http:
            port: 8282

    serviceMonitor:
      main:
        enabled: true
        labels:
          obs.nahsilabs/metrics: "true"
        endpoints:
          - port: http
            path: /metrics
            interval: 30s
            relabelings:
              - action: replace
                regex: .*
                replacement: companion
                targetLabel: instance

    persistence:
      cache:
        type: emptyDir
        globalMounts:
          - path: /var/tmp/youtubei.js
