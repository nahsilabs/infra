# Import a published grafana.com dashboard by id. Lives in the component's obs/ dir.
# (For a custom in-repo dashboard, use the configMapRef pattern in dashboard-kustomization.yml.)
# Do NOT set resyncPeriod — the operator already re-asserts every ~10m by default.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: <name>
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"

  # The `# renovate:` comment lets Renovate bump the revision automatically
  # (see .github/renovate.json grafana-dashboards datasource).
  grafanaCom:
    # renovate: depName="<dashboard name>"
    id: <grafana.com-dashboard-id>
    revision: <revision>      # pin an initial value; Renovate updates it

  # Only for OLDER dashboards that declare an __inputs datasource (e.g. DS_PROMETHEUS).
  # Modern dashboards use a datasource template variable that auto-resolves to the default
  # (VictoriaMetrics), so this is usually unnecessary.
  # datasources:
  #   - inputName: DS_PROMETHEUS
  #     datasourceName: VictoriaMetrics
