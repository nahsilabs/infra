# Two files when adding an obs/ dir to a component:

# (1) the obs/ dir's own kustomize list — flux/observability/<...>/<name>/obs/kustomization.yml
# ---
# apiVersion: kustomize.config.k8s.io/v1beta1
# kind: Kustomization
# resources:
#   - dashboard.yml

# (2) a dedicated Flux Kustomization appended to the component's ks.yml (after `---`),
#     keeping the workload independent of grafana:
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: <ks-name>-dashboards   # e.g. obs-node-exporter-dashboards
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-grafana-operator
    - name: obs-grafana
  path: ./flux/observability/<...>/<name>/obs
  targetNamespace: observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: infra
    namespace: flux-system
  interval: 1h
  retryInterval: 2m
  timeout: 5m
